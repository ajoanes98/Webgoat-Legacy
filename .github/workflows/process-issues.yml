name: List GitHub Issues

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Port Run ID'
        required: true
      service_identifier:
        description: 'Port Service identifier'
        required: true
      service_title:
        description: 'Port Service title'
        required: false
      repo:
        description: 'GitHub repo in owner/repo format'
        required: true
      state:
        description: 'Issue state: open, closed, or all'
        required: false
        default: 'open'
      port_payload:
        description: 'Full Port context payload (JSON)'
        required: false

jobs:
  list-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch GitHub Issues
        id: fetch_issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.event.inputs.repo }}"
          STATE="${{ github.event.inputs.state }}"

          ISSUES=$(gh api \
            "/repos/${REPO}/issues?state=${STATE}&per_page=100" \
            --jq '[.[] | select(.pull_request == null) | {
              number: .number,
              title: .title,
              state: .state,
              url: .html_url,
              labels: [.labels[].name],
              assignee: .assignee.login,
              created_at: .created_at,
              updated_at: .updated_at,
              body: .body
            }]')

          echo "issues<<EOF" >> $GITHUB_OUTPUT
          echo "$ISSUES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Report success to Port
        if: success()
        run: |
          curl -s -X PATCH \
            "https://api.port.io/v1/actions/runs/${{ github.event.inputs.run_id }}" \
            -H "Authorization: Bearer ${{ secrets.PORT_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "SUCCESS",
              "message": {
                "issues": ${{ steps.fetch_issues.outputs.issues }},
                "service": "${{ github.event.inputs.service_title }}",
                "repo": "${{ github.event.inputs.repo }}",
                "state": "${{ github.event.inputs.state }}"
              }
            }'

      - name: Report failure to Port
        if: failure()
        run: |
          curl -s -X PATCH \
            "https://api.port.io/v1/actions/runs/${{ github.event.inputs.run_id }}" \
            -H "Authorization: Bearer ${{ secrets.PORT_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"status": "FAILURE", "message": {"run_status": "Failed to fetch issues"}}'
